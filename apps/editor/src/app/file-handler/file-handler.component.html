<input
  type="file"
  #input
  class="sr-only"
  accept=".sav,.savdata,.bin,application/octet-stream"
  (change)="parseSaveGame($event)"
/>
<div class="drop-zone-content">
  <h2>Open save file</h2>
  <p>Drop a Coral Island save here, or select one from this device.</p>
  <p class="privacy-note">Save files stay in your browser. Nothing is uploaded.</p>
</div>
